server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    root /var/www/kabanchik/current;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}